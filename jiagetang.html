<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>双南唐 - 双南液典藏系列</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            line-height: 1.2;
            padding: 20px;
        }
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* 修复视频白条核心样式 */
        .video-wrapper {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%;
            position: relative;
            background-color: #000;
            border-radius: 4px;
            overflow: hidden; /* 裁掉溢出的白色区域 */
        }
        .video-wrapper iframe {
            position: absolute;
            top: -4px; /* 向上偏移抵消顶部白条 */
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
            transform: none !important;
        }
        /* 酒图样式：取消阴影，尺寸协调 */
        .wine-image {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            display: block;
            border-radius: 4px;
        }
        .info-section {
            background-color: #1a1a1a;
            text-align: center;
            padding: 20px 0;
        }
        .brand-name {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            display: inline-block;
        }
        .brand-name::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #ffffff;
        }
        .product-desc {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            color: #cccccc;
            margin-bottom: 25px;
        }
        .price-box {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
        }
        .price-num {
            font-size: clamp(4rem, 15vw, 6rem);
            font-weight: 700;
            line-height: 1;
        }
        .retail-tag {
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            color: #000;
            background-color: #ffd700;
            padding: 2px 6px;
            border-radius: 2px;
            margin-bottom: 18px;
        }
        .currency {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            color: #cccccc;
            margin-bottom: 8px;
        }
        .product-label {
            max-width: 800px;
            margin: 20px auto 0;
            padding: 30px;
            background-color: #1a1a1a;
            font-family: "Microsoft Yahei", serif;
        }
        .label-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
            color: #d4af37;
            font-size: clamp(1rem, 3vw, 1.3rem);
            line-height: 1.8;
        }
        .label-item {
            display: flex;
            flex-wrap: wrap;
        }
        .label-item strong {
            min-width: 120px;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            .label-content {
                grid-template-columns: 1fr;
                font-size: clamp(0.9rem, 3vw, 1.1rem);
            }
            .label-item strong {
                min-width: 100px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .price-box {
                gap: 5px;
            }
            .retail-tag {
                margin-bottom: 15px;
            }
            .product-label {
                padding: 20px;
            }
            .wine-image {
                max-width: 300px;
                margin: 15px auto;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="video-wrapper">
            <iframe 
                src="https://willheizi.github.io/shuangnanye-video/video.html" 
                allowfullscreen="true"
                allow="autoplay; fullscreen; picture-in-picture"
                scrolling="no"
            ></iframe>
        </div>
        <img 
            class="wine-image"
            src="https://raw.githubusercontent.com/willheizi/tangjiage/925cbfbea17aa03b09bf0fc88b4608029aa07b52/tangBG.png"
            alt="双南唐白酒"
        >
        <div class="info-section">
            <h1 class="brand-name">双南唐</h1>
            <p class="product-desc">双南液典藏系列 46°浓香型白酒</p>
            <div class="price-box">
                <span class="price-num">598</span>
                <span class="retail-tag">零售价</span>
                <span class="currency">RMB</span>
            </div>
        </div>
        <div class="product-label">
            <div class="label-content">
                <div class="label-item">
                    <strong>[食品名称]</strong> 双南唐
                </div>
                <div class="label-item">
                    <strong>[配　　料]</strong> 水、高粱、大米、糯米、小麦、玉米
                </div>
                <div class="label-item">
                    <strong>[香　　型]</strong> 浓香型白酒
                </div>
                <div class="label-item">
                    <strong>[产品类型]</strong> 固态法白酒
                </div>
                <div class="label-item">
                    <strong>[酒精度]</strong> 46%vol
                </div>
                <div class="label-item">
                    <strong>[食品生产许可证号]</strong> SC11551068350987
                </div>
                <div class="label-item">
                    <strong>[净含量]</strong> 500ml
                </div>
                <div class="label-item">
                    <strong>[贮藏条件]</strong> 常温、阴凉、通风、干燥处保存
                </div>
                <div class="label-item">
                    <strong>[生产日期]</strong> 见标签喷码处
                </div>
                <div class="label-item">
                    <strong>[生产单位]</strong> 四川绵竹双南液酒业有限公司
                </div>
                <div class="label-item">
                    <strong>[产品标准号]</strong> GB/T 10781.1-2021(优级)
                </div>
                <div class="label-item">
                    <strong>[厂　　址]</strong> 四川省绵竹市新市镇
                </div>
                <div class="label-item">
                    <strong>[产　　地]</strong> 四川省德阳市
                </div>
                <div class="label-item">
                    <strong>[电　　话]</strong> 400-0900078
                </div>
            </div>
        </div>
    </div>
</body>
</html>
